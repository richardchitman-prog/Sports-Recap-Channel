name: Daily Sports Recap

on:
  schedule:
    # 13:00 UTC = 9am ET / 8am CT -- after prior night's games are final
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg for moviepy)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        working-directory: scripts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PRIVACY_STATUS: "public"
        run: python main.py nba nfl mlb epl worldcup

      - name: Commit new blog posts
        run: |
          git config user.name "sports-recap-bot"
          git config user.email "actions@github.com"
          git add docs/_posts
          git diff --cached --quiet || git commit -m "Daily recap: $(date -u +%Y-%m-%d)"
          git push
